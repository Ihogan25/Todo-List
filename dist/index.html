<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="main.js" defer rel="script"></script>
    <title>To-do List</title>
</head>
<body>

    <div class="header">
        <h1>To-Do List</h2>
        <div>
            <p class="high">High</p>
            <p class="mid">Mid</p>
            <p class="low">Low</p>
        </div>
    </div>

    <!--Main content-->
    <main class="main-container">
        <!--Side bar-->
        <div class="side-bar">
            <div class="specificity">
                <div id="priority">Important</div>
                <div id="tasks-daily">Today</div>
                <div id="tasks-weekly">This Week</div>
            </div>
            <div class="projects">
                <div class="project-head"><h2>Projects</h2><button id="new-project-btn">+</button></div>
                <div class="projects-list" id="projects-list">
                </div>
            </div>
        </div>
        <!--main content-->
        <div class="content">
            <!-- title  for current projects/project-->
            <div class="title">
                <h2 id="main-title">Create a project!</h2>
            </div>
            <button class="add-task" id="add-task-btn">Add task</button>    
            <div class="tasks-list" id="tasks-list">
            </div>
        </div>
        </div>

        <div class="forms-cover" id="forms-cover">
            <!--Add project form-->
            <div class="project-form" id="project-form">
                <form class="form">
                    <label>Title</label>
                    <input type="text" id="project-title" >
                    <button class="cancel" id="cancel-project">Cancel</button>
                    <button type="submit" id="smbt-proj-btn" class="submit-form">Submit</button>
                </form>
            </div>
            <!--Add Task From-->
            <div class="task-form" id="task-form">
                <form class="form">
                    <label for="task">Task title</label>
                    <input type="text" id="task-title" >
                    <fieldset>
                        <label for="importance">Priority?</label>
                        <select name="importance" id="task-priority" >
                            <option value="high">High</option>
                            <option value="mid">Mid</option>
                            <option value="low">Low</option>
                          </select>
                    </fieldset>
                    <label for="date">Due date:</label>
                    <input type="date" name="date" id="task-date" >
                    <button class="cancel" id="cancel-task">Cancel</button>
                    <button type="submit" id="smbt-task-btn" class="submit-form">Submit</button>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
