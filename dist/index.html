<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="main.js" defer rel="script"></script>
    <title>To-do List</title>
</head>
<body>

    <div class="header">
        <h1>To-Do List</h2>
    </div>


    <!--Main content-->
    <main class="main-container">
        <!--Side bar-->
        <div class="side-bar">
            <div class="specificity">
                <div>Important</div>
                <div>Today</div>
                <div>This Week</div>
            </div>

            <div class="projects">
                <div class="project-head">Projects<button id="new-project">+</button></div>


                <div class="projects-list">
                    <div class="project">Project 1</div>
                </div>
            </div>

        </div>
        <!--main content-->
        <div class="content">

            <!-- title  for current projects/project-->
            <div class="title">
                <h2 id="title">Your Tasks</h2>
            </div>


            <!-- display tasks-->
            <div class="tasks">
                <div class="task-list">
                    <div class="task"></div>
                </div>
            </div>
        </div>

        <!--add task form-->
        
        <div class="project-form" id="project-form">
            <div>
                <form >
                    <label for="title">Title</label>
                    <input type="text" id="project-title">
                    <label for="finish-by">Expected Completion Date?</label>
                    <input type="text">
                    <button type="submit">Submit</button>
                </form>
            </div>
        </div>
        
    </main>
</body>
</html>
